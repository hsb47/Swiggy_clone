version: 0.2

env:
  parameter-store:
    DOCKER_REGISTRY_USERNAME: /cicd/docker-credentials/username
    DOCKER_REGISTRY_PASSWORD: /cicd/docker-credentials/password
    DOCKER_REGISTRY_URL: /cicd/docker-registry/url
    SONAR_TOKEN: /cicd/sonar/sonar-token

phases:

  install:
    runtime-versions:
      python: 3.11
      java: corretto17

    commands:
      - echo "Installing Sonar Scanner..."
      - wget -q https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-4.7.0.2747-linux.zip
      - unzip -q sonar-scanner-cli-4.7.0.2747-linux.zip
      - export PATH=$PATH:$(pwd)/sonar-scanner-4.7.0.2747-linux/bin

      - echo "Installing OWASP Dependency Check..."
      - wget -q https://github.com/jeremylong/DependencyCheck/releases/download/v9.0.9/dependency-check-9.0.9-release.zip
      - unzip -q dependency-check-9.0.9-release.zip
      - mv dependency-check dependency-check-bin || true

      - echo "Installing Trivy..."
      - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh
      - export PATH=$PATH:$(pwd)/bin

  pre_build:
    commands:
      - echo "Running Trivy FILE scan..."
      - ./bin/trivy fs --exit-code 0 --no-progress . > trivy-file-scan.txt

      - echo "Logging into Docker Registry..."
      - echo "$DOCKER_REGISTRY_PASSWORD" | docker login "$DOCKER_REGISTRY_URL" -u "$DOCKER_REGISTRY_USERNAME" --password-stdin

  build:
    commands:
      - echo "Running SonarQube Scan..."
      - sonar-scanner -Dsonar.projectKey=Swiggy -Dsonar.sources=. -Dsonar.host.url=http://13.201.36.82:9000 -Dsonar.token=$SONAR_TOKEN

      - echo "Running OWASP Dependency Check..."
      - mkdir -p dependency-check-report
      - ./dependency-check-bin/bin/dependency-check.sh --scan . --format HTML --format JSON --disableAssembly --out dependency-check-report

      - echo "Building Docker image..."
      - docker build -t "$DOCKER_REGISTRY_USERNAME/swiggy:latest" .

      - echo "Running Trivy IMAGE scan..."
      - ./bin/trivy image --exit-code 0 --no-progress "$DOCKER_REGISTRY_USERNAME/swiggy:latest" > trivy-image-scan.txt

      - echo "Pushing Docker image..."
      - docker push "$DOCKER_REGISTRY_USERNAME/swiggy:latest"

  post_build:
    commands:
      - echo "Build completed successfully"

artifacts:
  files:
    - trivy-file-scan.txt
    - trivy-image-scan.txt
    - dependency-check-report/**/*