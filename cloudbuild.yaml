substitutions:
  _SERVICE_NAME: harsha-swiggy
  _REGION: asia-south1
  _REPO: harsha-swiggy-repo
  _IMAGE: swiggy
  _SONAR_HOST_URL: http://35.207.246.55:9000

steps:
- name: 'sonarsource/sonar-scanner-cli'
  secretEnv:
    - SONAR_TOKEN
  entrypoint: sh
  args:
    - -c
    - |
      mkdir -p /tmp/.scannerwork

      sonar-scanner \
      -Dsonar.projectKey=swiggy \
      -Dsonar.projectName=swiggy \
      -Dsonar.sources=src \
      -Dsonar.host.url=${_SONAR_HOST_URL} \
      -Dsonar.login=$$SONAR_TOKEN \
      -Dsonar.working.directory=/tmp/.scannerwork


- name: 'owasp/dependency-check'
  allowFailure: true
  entrypoint: /bin/sh
  secretEnv:
    - NVD_API_KEY
  args:
    - -c
    - |
      /usr/share/dependency-check/bin/dependency-check.sh \
      --scan /workspace \
      --format HTML \
      --project swiggy \
      --out /workspace/reports \
      --nvdApiKey=$$NVD_API_KEY || true



- name: 'gcr.io/cloud-builders/docker'
  args:
    - build
    - -t
    - asia-south1-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:$SHORT_SHA
    - .

- name: 'aquasec/trivy'
  entrypoint: sh
  args:
    - -c
    - |
      trivy image \
      --exit-code 0 \
      --severity HIGH,CRITICAL \
      --ignore-unfixed \
      asia-south1-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:$SHORT_SHA

- name: 'gcr.io/cloud-builders/docker'
  args:
    - push
    - asia-south1-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:$SHORT_SHA

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
    - run
    - deploy
    - ${_SERVICE_NAME}
    - --image=asia-south1-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:$SHORT_SHA
    - --region=${_REGION}
    - --platform=managed
    - --allow-unauthenticated
    - --no-traffic

- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: bash
  args:
    - -c
    - |
      set -e

      echo "Fetching latest revision..."

      LATEST=$$(gcloud run services describe ${_SERVICE_NAME} \
        --region=${_REGION} \
        --format='value(status.latestReadyRevisionName)')

      echo "Latest revision: $$LATEST"

      PREV=$$(gcloud run revisions list \
        --service=${_SERVICE_NAME} \
        --region=${_REGION} \
        --sort-by="~metadata.creationTimestamp" \
        --format='value(metadata.name)' \
        --limit=2 | tail -n 1)

      echo "Previous revision: $$PREV"

      if [[ -z "$$PREV" || "$$PREV" == "$$LATEST" ]]; then

        echo "No valid previous revision found."
        echo "Routing 100% traffic to latest."

        gcloud run services update-traffic ${_SERVICE_NAME} \
          --to-revisions=$$LATEST=100 \
          --region=${_REGION}

      else

        echo "Applying Canary Deployment"
        echo "90% old / 10% new"

        gcloud run services update-traffic ${_SERVICE_NAME} \
          --to-revisions=$$LATEST=10,$$PREV=90 \
          --region=${_REGION}

      fi

- name: 'ubuntu'
  entrypoint: bash
  args:
    - -c
    - |
      echo "========================================"
      echo "PIPELINE COMPLETED SUCCESSFULLY"
      echo "========================================"
      echo "SonarQube Dashboard:"
      echo "${_SONAR_HOST_URL}"
      echo ""
      echo "OWASP Reports:"
      echo "/workspace/reports"
      echo "========================================"

images:
  - asia-south1-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_IMAGE}:$SHORT_SHA

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/SONAR_TOKEN/versions/latest
      env: SONAR_TOKEN

    - versionName: projects/$PROJECT_ID/secrets/NVD_API_KEY/versions/latest
      env: NVD_API_KEY

options:
  logging: CLOUD_LOGGING_ONLY


