steps:
  # 🔨 Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - asia-south1-docker.pkg.dev/$PROJECT_ID/harsha-swiggy-repo/swiggy:$SHORT_SHA
      - .

  # 📦 Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - asia-south1-docker.pkg.dev/$PROJECT_ID/harsha-swiggy-repo/swiggy:$SHORT_SHA

  # 🚀 Deploy to Cloud Run (NO TRAFFIC)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - swiggy
      - --image=asia-south1-docker.pkg.dev/$PROJECT_ID/harsha-swiggy-repo/swiggy:$SHORT_SHA
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --no-traffic

  # 🧪 Canary rollout (10% new, 90% old)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        echo "Fetching revisions..."

        LATEST=$(gcloud run services describe swiggy \
          --region=asia-south1 \
          --format='value(status.latestReadyRevisionName)')

        PREV=$(gcloud run services describe swiggy \
          --region=asia-south1 \
          --format='value(status.traffic[0].revisionName)')

        echo "Latest: $LATEST"
        echo "Previous: $PREV"

        gcloud run services update-traffic swiggy \
          --to-revisions=$LATEST=10,$PREV=90 \
          --region=asia-south1

options:
  logging: CLOUD_LOGGING_ONLY
